<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>New Tab</title>
  <!-- Theme first, synchronously, so there's no flash of unthemed content.
       window.FB_THEME is written by the main process (theme-state.js); the
       page applies it inline before first paint and exposes __applyFbTheme so
       the main process can push live updates into an already-open tab. -->
  <script src="theme-state.js"></script>
  <script src="../theme/palettes.js"></script>
  <script src="../theme/applyTheme.js"></script>
  <script>
    (function () {
      var t = window.FB_THEME || (window.FocusTheme && window.FocusTheme.DEFAULT_THEME) || { palette: 'nightlofi', mode: 'dark' };
      window.FocusTheme.applyTheme(t.palette, t.mode);
      window.__applyFbTheme = function (palette, mode) {
        window.FocusTheme.applyTheme(palette, mode);
        if (window.__fbRefreshPattern) window.__fbRefreshPattern();
      };
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--fb-bg, #211d1a);
      color: var(--fb-text, #ece6df);
      font-family: var(--fb-font-sans, -apple-system, "Segoe UI", Roboto, sans-serif);
      overflow-x: hidden;
      overflow-y: auto;
    }

    #pattern {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .home-container {
      position: relative;
      z-index: 1;
      min-height: 100%;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .home-header { text-align: center; }
    .home-header .greeting {
      font-family: var(--fb-font-serif, Georgia, serif);
      font-size: 34px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--fb-text, #ece6df);
    }
    .home-header .clock {
      margin-top: 6px;
      font-family: var(--fb-font-mono, monospace);
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--fb-muted, #a89f92);
      font-variant-numeric: tabular-nums;
    }

    .search-wrap { width: 100%; max-width: 480px; position: relative; display: flex; align-items: center; }
    .search-wrap .search-icon {
      position: absolute;
      left: 16px;
      display: flex;
      color: var(--fb-muted, #a89f92);
      pointer-events: none;
    }
    #search-input {
      width: 100%;
      height: 46px;
      border-radius: 23px;
      border: 1px solid var(--fb-border, #3a332c);
      background: var(--fb-surface, #2a2521);
      color: var(--fb-text, #ece6df);
      padding: 0 20px 0 44px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    #search-input:focus { border-color: var(--fb-accent, #d98b6b); }
    #search-input::placeholder { color: var(--fb-muted, #a89f92); }

    .bookmarks-section { width: 100%; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--fb-muted, #a89f92);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--fb-border, #3a332c);
    }
    .bookmarks-grid { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
    .bookmark-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--fb-surface, #2a2521);
      border: 1px solid var(--fb-border, #3a332c);
      border-radius: 20px;
      text-decoration: none;
      transition: border-color 0.15s ease, transform 0.15s ease;
      cursor: pointer;
      max-width: 180px;
    }
    .bookmark-card:hover { border-color: var(--fb-accent, #d98b6b); transform: translateY(-1px); }
    .bookmark-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .bookmark-title {
      font-size: 12px;
      color: var(--fb-text, #ece6df);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-bookmarks {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 20px;
      color: var(--fb-muted, #a89f92);
      text-align: center;
    }
    .no-bookmarks svg { width: 26px; height: 26px; color: var(--fb-muted, #a89f92); opacity: 0.6; }
    .no-bookmarks p { font-size: 13px; max-width: 320px; line-height: 1.5; }
    .hidden { display: none !important; }
  </style>
</head>

<body>
  <canvas id="pattern" aria-hidden="true"></canvas>
  <div class="home-container">
    <header class="home-header">
      <div class="greeting" id="greeting">Hello</div>
      <div class="clock" id="clock"></div>
    </header>

    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search or enter address" autocomplete="off" spellcheck="false" />
    </div>

    <main class="bookmarks-section">
      <div class="section-title">Bookmarks</div>
      <div id="bookmarks-grid" class="bookmarks-grid"></div>
      <div id="no-bookmarks" class="no-bookmarks hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
        <p>No bookmarks yet. Click the heart icon in the address bar on any site to save one here.</p>
      </div>
    </main>
  </div>

  <script src="bookmarks.js"></script>
  <script src="newtab.js"></script>
</body>

</html>
