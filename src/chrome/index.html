<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>chrome</title>
  <link rel="stylesheet" href="chrome.css" />
</head>
<body>
  <div id="tab-strip">
    <div id="tabs"></div>
    <button id="new-tab-btn" title="New tab" aria-label="New tab" data-icon="plus" data-icon-size="16"></button>
  </div>
  <div id="toolbar">
    <button id="workspace-btn" title="Toggle workspace sidebar" aria-label="Toggle workspace sidebar" data-icon="folder" data-icon-size="15"></button>
    <button id="back-btn" title="Back" aria-label="Back" data-icon="back" data-icon-size="15"></button>
    <button id="forward-btn" title="Forward" aria-label="Forward" data-icon="forward" data-icon-size="15"></button>
    <button id="reload-btn" title="Reload" aria-label="Reload" data-icon="reload" data-icon-size="15"></button>
    <div id="incognito-badge" title="This tab is incognito — nothing here is saved to history or usage stats">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Incognito</span>
    </div>
    <div id="address-container">
      <input id="address-bar" type="text" placeholder="Search or enter address" />
      <span id="zoom-badge" class="hidden">100%</span>
      <button id="heart-btn" title="Bookmark this page" aria-label="Bookmark this page">
        <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
    </div>
    <button id="reader-btn" title="Reader view" aria-label="Reader view" data-icon="book" data-icon-size="15"></button>
    <button id="new-group-btn" title="Put this tab in a new group">Group</button>
    <button id="focus-mode-btn" title="Toggle Focus Mode">Focus</button>
    <button id="pomodoro-btn" title="Focus timer">25:00</button>
    <button id="launcher-btn" title="Launch profile" aria-label="Launch profile" data-icon="rocket" data-icon-size="15"></button>
    <button id="dashboard-btn" title="Usage dashboard" aria-label="Usage dashboard" data-icon="chart" data-icon-size="15"></button>
    <button id="ai-chat-btn" title="AI Chat" aria-label="AI Chat" data-icon="chat" data-icon-size="15"></button>
    <button id="settings-btn" title="Settings" aria-label="Settings" data-icon="gear" data-icon-size="15"></button>
  </div>
  <div id="find-box" class="hidden">
    <input id="find-input" type="text" placeholder="Find in page..." />
    <span id="find-count">0 of 0</span>
    <button id="find-prev" title="Previous" aria-label="Previous match" data-icon="up" data-icon-size="13"></button>
    <button id="find-next" title="Next" aria-label="Next match" data-icon="down" data-icon-size="13"></button>
    <button id="find-close" title="Close" aria-label="Close find" data-icon="close" data-icon-size="13"></button>
  </div>
  <div id="suggestions" class="hidden"></div>
  <div id="toast" class="hidden"></div>
  <script src="../theme/palettes.js"></script>
  <script src="../theme/applyTheme.js"></script>
  <script src="../theme/icons.js"></script>
  <script src="chrome.js"></script>
</body>
</html>
